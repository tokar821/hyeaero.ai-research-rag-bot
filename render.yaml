# Copy this file to the ROOT of your BACKEND repository as render.yaml
# Then in Render: New → Blueprint → connect backend repo → apply. Set env vars in the dashboard.
# Root Directory is left blank (repo root = backend app).

services:
  - type: web
    name: hyeaero-api
    runtime: python
    # Do not set PIP_REQUIRE_HASHES unless requirements.txt is a fully hash-pinned lockfile (pip-compile).
    # CPU torch is pinned in requirements.txt to avoid CUDA wheels and huge installs.
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Smaller BGE + tighter caps — same rerank API, lower RAM (starter Render). Use 0/false to force full large model.
      - key: RAG_RERANK_LIGHT
        value: auto
      - key: POSTGRES_CONNECTION_STRING
        sync: false
      - key: CORS_ORIGINS
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_HOST
        sync: false
